<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <linearGradient id="boxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#37a0e0"/>
      <stop offset="100%" stop-color="#2b7cb8"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff9f1a"/>
      <stop offset="100%" stop-color="#e67e00"/>
    </linearGradient>
  </defs>
  <!-- Container box body -->
  <rect x="12" y="36" width="72" height="48" rx="6" fill="url(#boxGrad)" opacity="0.9"/>
  <!-- Container box rim -->
  <rect x="12" y="36" width="72" height="16" rx="6" fill="#2b7cb8"/>
  <rect x="12" y="46" width="72" height="6" fill="#2b7cb8"/>
  <!-- Container tab/label -->
  <rect x="30" y="28" width="36" height="12" rx="4" fill="#2b7cb8"/>
  <!-- Arrow pointing down into the container -->
  <rect x="43" y="8" width="10" height="36" rx="5" fill="url(#arrowGrad)"/>
  <polygon points="48,60 62,44 34,44" fill="url(#arrowGrad)"/>
  <!-- Shine highlight -->
  <rect x="16" y="54" width="28" height="3" rx="1.5" fill="#fff" opacity="0.25"/>
</svg>
